sonar.projectKey=tasklist-backend
sonar.projectName=tasklist-backend
sonar.projectVersion=1.0.0

sonar.sources=src
sonar.tests=src/__tests__
sonar.sourceEncoding=UTF-8

sonar.exclusions=**/__tests__/**,**/node_modules/**,dist/**,coverage/**
sonar.test.inclusions=**/__tests__/**/*.test.ts
sonar.coverage.exclusions=src/server.ts,**/*.config.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.junit.reportPaths=reports/junit.xml
